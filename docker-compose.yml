version: '3.9'

services:
  db:
    image: postgres:16-alpine
    container_name: financeflow_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-financeflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-financeflow}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - financeflow_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-financeflow}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: financeflow_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-financeflow}:${POSTGRES_PASSWORD:-changeme}@db:5432/${POSTGRES_DB:-financeflow}
      SECRET_KEY: ${SECRET_KEY:-supersecretkey_change_in_production}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 1440
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost,http://localhost:80}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - financeflow_net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: financeflow_frontend
    restart: unless-stopped
    networks:
      - financeflow_net
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    container_name: financeflow_nginx
    restart: unless-stopped
    ports:
      - "${APP_PORT:-80}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - financeflow_net
    depends_on:
      - frontend
      - backend

volumes:
  postgres_data:

networks:
  financeflow_net:
    driver: bridge
